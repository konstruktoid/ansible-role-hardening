---
dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: almalinux10
    image: docker.io/almalinux:10
    command: sleep 1d
    privileged: true
    volumes:
  - name: resolute
    image: docker.io/ubuntu:resolute
    command: sleep 1d
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: trixie
    image: docker.io/debian:trixie-slim
    command: sleep 1d
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
  playbooks:
    converge: "../default/converge.yml"
    verify: "../default/verify.yml"
  config_options:
    defaults:
      callback_whitelist: profile_tasks
      interpreter_python: auto_silent
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles
  log: true
  inventory:
    host_vars:
      almalinux10:
        crypto_policy: DEFAULT
        manage_rkhunter: false
        manage_ufw: false
        sshd_admin_net:
          - 0.0.0.0/0
        sshd_allow_groups:
          - vagrant
          - sudo
      trixie:
        ansible_facts.become_pass: vagrant
        ansible_facts.python_interpreter: /usr/bin/python3
        automatic_updates:
          enabled: true
          only_security: true
          reboot: false
          reboot_from_time: "2:00"
          reboot_time_margin_mins: 1
          custom_origins: ""
        disable_wireless: false
        sshd_admin_net:
          - 0.0.0.0/0
        sshd_allow_groups:
          - vagrant
          - sudo
        sshd_update_moduli: true
        system_upgrade: false
      resolute:
        automatic_updates:
          enabled: true
          only_security: true
          reboot: false
          reboot_from_time: "2:00"
          reboot_time_margin_mins: 1
          custom_origins: ""
        disable_ipv6: true
        disable_wireless: true
        manage_suid_sgid_permissions: false
        sshd_admin_net:
          - 0.0.0.0/0
        sshd_allow_groups:
          - vagrant
          - sudo
        sshd_match_users:
          - user: testuser01
            rules:
              - AllowUsers testuser01
              - AuthenticationMethods password
              - PasswordAuthentication yes
          - user: testuser02
            rules:
              - AllowUsers testuser02
              - Banner none
verifier:
  name: ansible
scenario:
  name: docker
  create_sequence:
    - dependency
    - create
    - prepare
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
