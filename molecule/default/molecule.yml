---
dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: resolute
    box: bento/ubuntu-26.04
    memory: 1024
    cpus: 1
    provider_raw_config_args:
      - customize ["modifyvm", :id, "--cableconnected1", "on"]
      - customize ['modifyvm', :id, '--uart1', '0x3F8', '4']
      - customize ['modifyvm', :id, '--uartmode1', 'file', File::NULL]
  - name: trixie
    box: bento/debian-13
    memory: 1024
    cpus: 1
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_whitelist: profile_tasks
      interpreter_python: auto_silent
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles
  log: true
  inventory:
    host_vars:
      resolute:
      trixie:
        system_upgrade: false
verifier:
  name: ansible
scenario:
  name: default
  create_sequence:
    - dependency
    - create
    - prepare
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
