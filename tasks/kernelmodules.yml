---
- name: Ensure kmod is installed
  become: true
  ansible.builtin.package:
    name: kmod
    state: present

- name: Blacklist kernel file system modules
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/modprobe.d/disablefs.conf
    line: blacklist {{ item }}
    mode: "0644"
    owner: root
    group: root
    state: present
    create: true
  with_items:
    - "{{ fs_modules_blocklist }}"

- name: Blacklist kernel network modules
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/modprobe.d/disablenet.conf
    line: blacklist {{ item }}
    mode: "0644"
    owner: root
    group: root
    state: present
    create: true
  with_items:
    - "{{ net_modules_blocklist }}"

- name: Allow USB kernel modules if USBGuard is used
  ansible.builtin.set_fact:
    misc_modules_usbguard: "{{ misc_modules_blocklist | reject('search', 'usb') | list }}"

- name: Blacklist misc kernel modules
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/modprobe.d/disablemod.conf
    line: blacklist {{ item }}
    mode: "0644"
    owner: root
    group: root
    state: present
    create: true
  with_items:
    - "{{ misc_modules_usbguard if manage_usbguard else misc_modules_blocklist }}"

- name: Combine kernel modules
  ansible.builtin.set_fact:
    role_modules_blocklist: >-
      {{ (fs_modules_blocklist
          + net_modules_blocklist
          + (misc_modules_usbguard if manage_usbguard else misc_modules_blocklist))
         | unique }}

- name: Block kernel modules
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/modprobe.d/blacklist-blocked.conf
    line: install {{ item }} /bin/true
    mode: "0644"
    owner: root
    group: root
    state: present
    create: true
  with_items:
    - "{{ role_modules_blocklist | sort }}"
